name: Bug Report
description: Something isn't working correctly
labels: [ bug ]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out every section — incomplete reports will be closed.

  - type: input
    id: version
    attributes:
      label: WAVORA version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device & Android version
      placeholder: "e.g. Pixel 7, Android 14 (API 34)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What is happening? Be specific.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logcat output
      description: |
        Filter by tag `WavoraPlaybackService`, `MusicRepositoryImpl`, or `WAVORA` and paste relevant lines.
      render: text

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I can reproduce this consistently
          required: true
