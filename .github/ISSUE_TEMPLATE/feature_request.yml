name: Feature Request
description: Suggest a new feature or improvement
labels: [ enhancement ]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? What's the user need?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Playback
        - Library / Discovery
        - Playlists
        - Search
        - UI / Design
        - Accessibility
        - Performance / Battery
        - Settings
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this hasn't been requested before
          required: true
